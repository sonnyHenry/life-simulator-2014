name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Quality gates
        run: |
          pnpm typecheck
          pnpm test
          pnpm validate
          # 长尾内容抽样方差:固定种子下,新增内容会整体位移 RNG 流,命中率 ~0.1%
          # 的展示性稀有结局(end_early_retire / end_cashflow_break)在小样本下会被
          # Poisson 波动漏采。历史上 n 从 300→1000,第二十七轮新增 14 事件 + 心理学线
          # 后 n=1000 又不再稳定命中这两个结局,提到 n=10000(λ≈8-11)才是可靠信号。
          pnpm simulate -n 10000 --check
      - name: Build web
        run: pnpm --filter @life-sim/web build
        env:
          VITE_BASE: /life-simulator-2014/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
